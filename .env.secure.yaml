bitwardenInfos:
  - name: ORGANIZATION
    value: ORGANIZATION_NAME
  - name: PROJECT
    value: PROJECT_NAME

env:
  BASE_STACK_NAME: ${ORGANIZATION}_${PROJECT}
  TZ: Europe/Berlin

secrets:
  cloudflare:
    prefix: true
    vars:
      - WORKERS_API_TOKEN
      - ACCOUNT_ID

  just:
    prefix: true
    vars:
      - DOMAIN

  just/gitlab:
    prefix: false
    vars:
      - name: JUST_GITLAB_DOMAIN
        field: domain
      - name: DOCKER_REGISTRY
        field: dockerRegistryDomain
      - DOCKER_PROXY
      - IMAGE_BASE
