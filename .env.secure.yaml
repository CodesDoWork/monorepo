bitwardenInfos:
  - name: ORGANIZATION
    value: ORGANIZATION_NAME
  - name: PROJECT
    value: PROJECT_NAME

env:
  DOCKER_REGISTRY: ${JUST_GITLAB_DOCKER_REGISTRY_DOMAIN}
  DOCKER_PROXY: ${JUST_GITLAB_DOMAIN}/${ORGANIZATION}/dependency_proxy/containers/
  IMAGE_BASE: ${DOCKER_REGISTRY}/${ORGANIZATION}/${PROJECT}
  BASE_STACK_NAME: ${ORGANIZATION}_${PROJECT}
  TZ: Europe/Berlin

secrets:
  cloudflare:
    prefix: true
    vars:
      - WORKERS_API_TOKEN
      - ACCOUNT_ID

  just:
    prefix: false
    vars:
      - DOMAIN

  just/gitlab:
    prefix: true
    vars:
      - DOMAIN
      - DOCKER_REGISTRY_DOMAIN
