stages:
  - nx
  - lint
  - deploy

.nx-install: &nx-install
  - apk add git
  - npm install -g @antfu/ni pnpm
  - pnpm config set store-dir .pnpm-store
  - nci

.cache: &cache
  cache:
    key: pnpm-store
    paths:
      - .pnpm-store/

.docker: &docker
  image: docker:27.1.2
  stage: deploy
  services:
    - name: docker:27.1.2-dind
      alias: docker-service
  <<: *cache
  variables:
    DOCKER_HOST: tcp://docker-service:2375/
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add npm
    - *nx-install
    - docker info
    - docker login -u ${DOCKER_REGISTRY_USER} -p ${DOCKER_REGISTRY_PASSWORD} ${DOCKER_REGISTRY}
    - npx nx run-many -t pre-build
    - cp .env.template .env
    - nr docker:build-workspace

nx-workspace:
  image: node:20.17.0-alpine
  stage: nx
  <<: *cache
  before_script:
    - *nx-install
  script:
    - npx nx affected -t format:check
    - npx nx affected -t lint
    - npx nx affected -t check
    - npx nx affected -t test
    - npx nx affected -t pre-build
    - npx nx affected -t build -c production
  except:
    - master
    - /^docker-test\/.*$/
  resource_group: single

docker-test:
  <<: *docker
  script:
    - npx nx affected -t build-image --parallel 1
  only:
    - /^docker-test\/.*$/
  resource_group: single

sonarqube-scanner:
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  stage: lint
  script:
    - sonar-scanner
  allow_failure: true
  only:
    - master
  resource_group: single

deploy:
  <<: *docker
  script:
    # ssh
    - apk add openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - grep "${KNOWN_HOST_PUB}" ~/.ssh/known_hosts || echo "${KNOWN_HOST_PUB}" > ~/.ssh/known_hosts
    - echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
    - chmod 400 ~/.ssh/id_rsa

    # build images
    - npx nx build just-site # generate types needed for documentation
    - npx nx affected --base=remotes/origin/master~1 -t build-image --parallel 1
    - npx nx build-image documentation

    # copy deploy targets, pull and run docker containers
    - npx nx run-many -t deploy
    - cp ./docker-compose.yml ./deploy/opt/monorepo
    - node prepare-production-compose.js

    - npx nx run-many -t deploy-command --parallel 1
    - echo docker compose -f /opt/monorepo/docker-compose.yml up -d --pull always --remove-orphans >> ./deploy/opt/monorepo/deploy-commands.sh

    # copy deploy scripts
    - scp -rp ./deploy/* ${SSH_USER}@${SSH_HOST}:/

    # docker login
    - ssh ${SSH_USER}@${SSH_HOST} docker login -u ${DOCKER_REGISTRY_USER} -p ${DOCKER_REGISTRY_PASSWORD} ${DOCKER_REGISTRY}

    # run deploy commands
    - ssh ${SSH_USER}@${SSH_HOST} chmod +x /opt/monorepo/deploy-commands.sh
    - ssh ${SSH_USER}@${SSH_HOST} /opt/monorepo/deploy-commands.sh
    - ssh ${SSH_USER}@${SSH_HOST} rm /opt/monorepo/deploy-commands.sh
  only:
    - master
  resource_group: single
