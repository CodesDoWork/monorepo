<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="../branding/assets/favicon/favicon.ico" />
        <link rel="stylesheet" href="./src/tailwind.css" />
        <title>Just Maintenance</title>
    </head>
    <body>
        <div class="flex min-h-screen flex-col items-center bg-slate-50 p-8 align-middle">
            <div class="my-auto text-center">
                <h1 id="" class="text-primary mb-4 text-2xl font-medium md:text-4xl">
                    🚧 We'll be back soon!
                </h1>
                <p class="text-secondary md:text-lg">
                    We're currently performing some maintenance. The site will be available shortly.
                    Thank you for your patience!
                </p>
                <div class="animate-spin-slow m-8 mx-auto size-10">
                    <img src="./src/assets/gear.svg" alt="Gear" />
                </div>
            </div>
        </div>

        <script>
            (function () {
                if (navigator.language.startsWith("de")) {
                    document.title = "Wartungsarbeiten";
                    document.getElementsByTagName("h1")[0].textContent =
                        "🚧 Wir sind in Kürze zurück!";
                    document.getElementsByTagName("p")[0].textContent = `
                        Wir führen derzeit Wartungsarbeiten durch. Die Seite wird bald wieder
                        verfügbar sein. Vielen Dank für Ihre Geduld!
                    `;
                }
            })();
        </script>
    </body>
</html>
