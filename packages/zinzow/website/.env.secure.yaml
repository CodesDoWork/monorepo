secrets:
  ../index:
    vars:
      - DOMAIN

  index:
    vars:
      - URL
      - PORT
      - CMS_TOKEN

  ../cms:
    prefix: true
    vars:
      - DOMAIN
      - URL

  ../../just/smtp:
    prefix: false
    vars:
      - name: SMTP_USERNAME
        field: username
      - name: SMTP_PASSWORD
        field: password
      - name: SMTP_HOST
        field: host
      - name: SMTP_PORT
        field: port

  ../test-auth:
    prefix: true
    vars:
      - USERNAME
      - PASSWORD
