query GetImpressionsData {
    impressions {
        title
        images {
            directus_files_id {
                ...DirectusImage
                description
                tags
                location
            }
        }
        allowYTPrompt: allow_youtube_prompt
        disableTPrompt: disable_youtube_prompt
    }

    videos: yt_videos {
        id: video_id
        title
        description
        location
        tags
        thumbnail {
            ...DirectusImage
        }
    }
}
